<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploading Images</title>

<link rel="icon" href="Image/logo.png">
<script src="https://cdn.jsdelivr.net/gh/IconCanyon/Icon-canyon@main/Wave-cloud-3.0.0.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    text-align: center;
    padding: 20px;
    user-select: none;
    text-align: -webkit-center;
}

img {
    user-select: none !important;
    -webkit-user-drag: none !important;
}

button {
    cursor: pointer;
}

.logo {
    margin-top: 30px;
    margin: 0 auto;
}
.logo img {
    height: 90px;
}

#drop-area {
    border: 2px dashed #ccc;
    padding: 30px;
    margin-bottom: 20px !important;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: -webkit-fill-available;
    width: 400px;
    height: 150px;
    margin: auto;
}

#drop-area.hover {
    border-color: #333;
}

#gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

#gallery img {
    position: relative;
    object-fit: cover;
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
}
.thumb {
    transition: ease 0.2s;
    position: relative;
    width: 150px;
    height: 150px;
    border: 1px solid #ccc;
}
.thumb button {
    position: absolute;
    right: 0;
    top: 0;
    background-color: rgba(255, 255, 255, 0.548);
    z-index: 4;
    margin: 5px;
    width: 30px;
    height: 30px;
    font-size: 24px;
    line-height: 0;
    font-family: math;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    box-shadow: 0px 1px 4px #0000003b;
}

.img-number {
    position: absolute;
    background-color: rgba(255, 255, 255, 0.548);
    top: 0;
    left: 0;
    z-index: 4;
    margin: 5px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    box-shadow: 0px 1px 4px #0000003b;
}

button {
    padding: 10px 20px;
    padding-right: 17px;
    margin: 20px 14px;
    border: solid 1px #ccc;
    border-radius: 25px;
    background: white;
    box-shadow: 0px 3px 7px #55647a61;
}

.thumb {
    position: relative;
    display: inline-block;
    margin: 5px;
    cursor: grab;
}

.thumb.dragging {
    opacity: 0.4;
    transform: scale(0.95);
}

.thumb.drag-over {
    outline: 3px solid #8bb4ff;
    outline-offset: 4px;
    transform: scale(1.05);
    background: rgba(76, 175, 80, 0.08);
    transition: 0.15s;
}

#progress-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    display: none; /* يظهر عند التحميل فقط */
    z-index: 1000;
}

#progress-bar {
    position: absolute;
    left: 0;
    transition: ease 0.4s;
    display: block;
    height: 100%;
    width: 0%;
    background-color: #3284ff;
}

.thumb {
    touch-action: none;
}
#clearBtn {
    display: none;
}


@media (max-width: 500px) {
    button,div,a,img {
        cursor: context-menu !important;
    }
    .thumb {
        width: 122px;
        height: 140px;
    }
    #drop-area {
        height: 50px;
    }
}
</style>
</head>
<body>

    <div id="progress-container">
        <span id="progress-bar"></span>
    </div>

    <div class="logo"><img src="Image/logo.png" alt=""></div>

<h1>Drag & Drop Images or Click to Upload</h1>
<div id="drop-area" class="Wave-cloud">
    Drag images here or click to select files
    <input type="file" id="fileElem" multiple style="display:none">
</div>

<div id="gallery"></div>

<button id="viewBtn" class="Wave-cloud">View Files</button><button class="Wave-cloud" id="clearBtn">Clear</button>

<script>
// إضافة مكتبة idb (اختياري) ولكن سنستخدم IndexedDB مباشرة
const dropArea = document.getElementById('drop-area');
const fileElem = document.getElementById('fileElem');
const gallery = document.getElementById('gallery');
let images = [];
let dragIndex = null;

// عناصر شريط التحميل
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');

// إعدادات السكرول التلقائي
const scrollEdge = 80;
const scrollSpeed = 15;
let autoScrollInterval = null;

// متغيرات IndexedDB
const DB_NAME = 'ImageGalleryDB';
const DB_VERSION = 1;
const STORE_NAME = 'images';

// فتح قاعدة البيانات
let db;

// تهيئة IndexedDB
function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        
        request.onerror = (event) => {
            console.error('Database error:', event.target.error);
            reject('Error opening database');
        };
        
        request.onsuccess = (event) => {
            db = event.target.result;
            console.log('Database opened successfully');
            resolve(db);
        };
        
        request.onupgradeneeded = (event) => {
            const db = event.target.result;
            
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                const store = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                store.createIndex('order', 'order', { unique: false });
                console.log('Object store created');
            }
        };
    });
}

// تحميل الصور من IndexedDB عند بدء الصفحة
async function loadImagesFromDB() {
    try {
        if (!db) await initDB();
        
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const index = store.index('order');
        const request = index.getAll();
        
        return new Promise((resolve, reject) => {
            request.onsuccess = () => {
                const items = request.result;
                items.sort((a, b) => a.order - b.order);
                images = items.map(item => item.dataURL);
                resolve(images);
            };
            
            request.onerror = () => {
                reject('Error loading images');
            };
        });
    } catch (error) {
        console.error('Error loading from DB:', error);
        images = [];
    }
}

// حفظ الصور في IndexedDB
async function saveImagesToDB(imageArray) {
    try {
        if (!db) await initDB();
        
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        
        store.clear();
        imageArray.forEach((dataURL, index) => {
            store.add({
                dataURL: dataURL,
                order: index,
                timestamp: Date.now()
            });
        });
        
        return new Promise((resolve, reject) => {
            transaction.oncomplete = () => {
                console.log('All images saved to DB');
                resolve();
            };
            
            transaction.onerror = () => {
                reject('Error saving images');
            };
        });
    } catch (error) {
        console.error('Error saving to DB:', error);
    }
}

// دالة لإزالة جميع الصور المحفوظة
async function clearAllImages() {
    if (images.length === 0) {
        alert('لا توجد صور لحذفها');
        return;
    }

    const confirmDelete = confirm('هل أنت متأكد من حذف جميع الصور؟');
    if (!confirmDelete) return;

    try {
        progressContainer.style.display = 'block';
        progressBar.style.width = '50%';

        images = [];

        if (db) {
            const transaction = db.transaction([STORE_NAME], 'readwrite');
            const store = transaction.objectStore(STORE_NAME);
            store.clear();

            await new Promise((resolve, reject) => {
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject('Error clearing database');
            });
        }

        progressBar.style.width = '100%';
        gallery.innerHTML = '<div class="empty-message">✨ قم برفع الصور لعرضها هنا</div>';

        setTimeout(() => {
            progressContainer.style.display = 'none';
            progressBar.style.width = '0%';
        }, 500);

        const clearBtn = document.getElementById('clearBtn');
        if (clearBtn) clearBtn.style.display = 'none';

    } catch (error) {
        console.error('Error clearing images:', error);
        alert('حدث خطأ أثناء حذف الصور');
        progressContainer.style.display = 'none';
    }
}

// دالة لحذف صورة واحدة
async function deleteSingleImage(index) {
    const confirmDelete = confirm('هل أنت متأكد من حذف هذه الصورة؟');
    if (!confirmDelete) return;
    
    try {
        images.splice(index, 1);
        await saveImagesToDB(images);
        
        // إزالة العنصر من DOM فقط دون إعادة تحميل الصور
        const thumb = gallery.querySelector(`.thumb[data-index='${index}']`);
        if (thumb) gallery.removeChild(thumb);

        // تحديث data-index لكل الصور المتبقية
        gallery.querySelectorAll('.thumb').forEach((el, i) => {
            el.dataset.index = i;
            const label = el.querySelector('.img-number');
            if (label) label.textContent = i + 1;
        });

    } catch (error) {
        console.error('Error deleting image:', error);
        alert('حدث خطأ أثناء حذف الصورة');
    }
}

// Open file selector on click
dropArea.addEventListener('click', (e) => {
    if (e.target.classList.contains('delete-btn')) return;
    fileElem.click();
});

// Handle file selection
fileElem.addEventListener('change', (e) => handleFiles(e.target.files));

// Drag & drop upload
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('hover');
});

dropArea.addEventListener('dragleave', () => dropArea.classList.remove('hover'));

dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('hover');
    handleFiles(e.dataTransfer.files);
});

// قراءة الملفات مع عرض شريط التحميل
function readFileAsDataURL(file, onProgress) {
    return new Promise((resolve) => {
        const reader = new FileReader();

        reader.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                onProgress(percent);
            }
        };

        reader.onloadstart = () => {
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
        };

        reader.onload = (e) => {
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 300);
            resolve(e.target.result);
        };

        reader.readAsDataURL(file);
    });
}

// Process files
async function handleFiles(files) {
    const fileArray = Array.from(files).filter(file => file.type.startsWith('image/'));
    
    let processedCount = 0;
    const totalFiles = fileArray.length;

    for (let i = 0; i < fileArray.length; i++) {
        const dataURL = await readFileAsDataURL(fileArray[i], (percent) => {
            progressBar.style.width = percent + '%';
        });
        
        images.push(dataURL);
        processedCount++;

        const totalProgress = (processedCount / totalFiles) * 100;
        progressBar.style.width = totalProgress + '%';
    }

    await saveImagesToDB(images);
    displayGallery();
}

// إزالة تأثير hover من جميع الصور
function removeAllDragOver() {
    document.querySelectorAll('.thumb.drag-over')
        .forEach(el => el.classList.remove('drag-over'));
}

// التحكم في السكرول التلقائي
function handleAutoScroll(touchY) {
    const viewportHeight = window.innerHeight;

    if (touchY < scrollEdge) startAutoScroll(-scrollSpeed);
    else if (touchY > viewportHeight - scrollEdge) startAutoScroll(scrollSpeed);
    else stopAutoScroll();
}

function startAutoScroll(speed) {
    if (autoScrollInterval) return;
    autoScrollInterval = setInterval(() => window.scrollBy(0, speed), 16);
}

function stopAutoScroll() {
    clearInterval(autoScrollInterval);
    autoScrollInterval = null;
}

// عرض الصور بدون إعادة تحميل عند السحب
function displayGallery() {
    if (images.length === 0) {
        gallery.innerHTML = '<div class="empty-message">✨ قم برفع الصور لعرضها هنا</div>';
        const clearBtn = document.getElementById('clearBtn');
        if (clearBtn) clearBtn.style.display = 'none';
        return;
    }

    const clearBtn = document.getElementById('clearBtn');
    if (clearBtn) clearBtn.style.display = 'inline-block';

    // إذا كان المعرض فارغًا، نقوم بإنشاء العناصر للمرة الأولى
    if (gallery.children.length === 0) {
        images.forEach((src, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'thumb';
            wrapper.draggable = true;
            wrapper.dataset.index = index;

            const img = document.createElement('img');
            img.src = src;
            img.alt = `صورة ${index + 1}`;
            img.draggable = false;
            img.loading = 'lazy';

            img.addEventListener('contextmenu', (e) => e.preventDefault());

            const label = document.createElement('span');
            label.textContent = index + 1;
            label.className = 'img-number';

            const deleteBtn = document.createElement('button');
            deleteBtn.textContent = '×';
            deleteBtn.className = 'delete-btn';
            deleteBtn.setAttribute('aria-label', 'حذف الصورة');
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                e.preventDefault();
                deleteSingleImage(index);
            };

            wrapper.appendChild(img);
            wrapper.appendChild(label);
            wrapper.appendChild(deleteBtn);

            gallery.appendChild(wrapper);
            setupDragEvents(wrapper, index);
        });
    }
}

// إعداد أحداث السحب
function setupDragEvents(wrapper, index) {
    wrapper.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('delete-btn')) { e.preventDefault(); return; }
        dragIndex = index;
        wrapper.classList.add('dragging');
    });

    wrapper.addEventListener('dragend', () => {
        wrapper.classList.remove('dragging');
        removeAllDragOver();
    });

    wrapper.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (dragIndex === index) return;
        removeAllDragOver();
        wrapper.classList.add('drag-over');
    });

    wrapper.addEventListener('dragleave', () => wrapper.classList.remove('drag-over'));

    wrapper.addEventListener('drop', async (e) => {
        e.preventDefault();
        const dropIndex = index;
        if (dragIndex === null || dragIndex === dropIndex) return;

        const movedItem = images.splice(dragIndex, 1)[0];
        images.splice(dropIndex, 0, movedItem);

        // إعادة ترتيب DOM فقط
        const draggedElem = gallery.querySelector(`.thumb[data-index='${dragIndex}']`);
        const dropElem = gallery.querySelector(`.thumb[data-index='${dropIndex}']`);
        if (draggedElem && dropElem) {
            gallery.insertBefore(draggedElem, dropIndex > dragIndex ? dropElem.nextSibling : dropElem);
        }

        // تحديث data-index لكل العناصر
        gallery.querySelectorAll('.thumb').forEach((el, i) => {
            el.dataset.index = i;
            const label = el.querySelector('.img-number');
            if (label) label.textContent = i + 1;
        });

        dragIndex = null;
        await saveImagesToDB(images);
    });

    // لمسات اللمس مع auto-scroll
    wrapper.addEventListener('touchstart', (e) => {
        if (e.target.classList.contains('delete-btn')) { e.preventDefault(); return; }
        dragIndex = index;
        wrapper.classList.add('dragging');
    }, { passive: true });

    wrapper.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        handleAutoScroll(touch.clientY);

        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!element) return;
        const target = element.closest('.thumb');
        if (!target) return;
        const overIndex = Number(target.dataset.index);
        if (overIndex === dragIndex) return;
        removeAllDragOver();
        target.classList.add('drag-over');
    }, { passive: false });

    wrapper.addEventListener('touchend', async (e) => {
        stopAutoScroll();
        wrapper.classList.remove('dragging');
        removeAllDragOver();

        const touch = e.changedTouches[0];
        const element = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!element) { dragIndex = null; return; }

        const target = element.closest('.thumb');
        if (!target) { dragIndex = null; return; }

        const dropIndex = Number(target.dataset.index);
        if (dragIndex !== null && dragIndex !== dropIndex) {
            const movedItem = images.splice(dragIndex, 1)[0];
            images.splice(dropIndex, 0, movedItem);

            const draggedElem = gallery.querySelector(`.thumb[data-index='${dragIndex}']`);
            const dropElem = gallery.querySelector(`.thumb[data-index='${dropIndex}']`);
            if (draggedElem && dropElem) {
                gallery.insertBefore(draggedElem, dropIndex > dragIndex ? dropElem.nextSibling : dropElem);
            }

            gallery.querySelectorAll('.thumb').forEach((el, i) => {
                el.dataset.index = i;
                const label = el.querySelector('.img-number');
                if (label) label.textContent = i + 1;
            });

            await saveImagesToDB(images);
        }
        dragIndex = null;
    });
}

// إرسال الصور للصفحة الأخرى
document.getElementById('viewBtn').addEventListener('click', async () => {
    if (images.length === 0) { alert('الرجاء رفع الصور أولاً'); return; }

    try {
        await saveImagesToDB(images);
        sessionStorage.setItem('imagesReady', 'true');
        sessionStorage.setItem('imageCount', images.length);
        window.location.href = 'viewer.html';
    } catch (error) {
        console.error('Error saving before navigation:', error);
        alert('حدث خطأ في حفظ الصور. الرجاء المحاولة مرة أخرى.');
    }
});

// إضافة مستمع حدث لزر المسح
const clearBtn = document.getElementById('clearBtn');
if (clearBtn) clearBtn.addEventListener('click', clearAllImages);

// تهيئة الصفحة - تحميل الصور المحفوظة
window.addEventListener('load', async () => {
    await initDB();
    await loadImagesFromDB();
    displayGallery();
});
</script>


<script src="zoom.js"></script>
</body>
</html>
