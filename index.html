<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uploading Images</title>

<link rel="icon" href="Image/logo.png">
<script src="https://cdn.jsdelivr.net/gh/IconCanyon/Icon-canyon@main/Wave-cloud-3.0.0.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f9f9f9;
    text-align: center;
    padding: 20px;
    user-select: none;
    text-align: -webkit-center;
}

img {
    user-select: none !important;
    -webkit-user-drag: none !important;
}

button {
    cursor: pointer;
}

.logo {
    margin-top: 30px;
    margin: 0 auto;
}
.logo img {
    height: 90px;
}

#drop-area {
    border: 2px dashed #ccc;
    padding: 30px;
    margin-bottom: 20px !important;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    max-width: -webkit-fill-available;
    width: 400px;
    height: 150px;
    margin: auto;
}

#drop-area.hover {
    border-color: #333;
}

#gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

#gallery img {
    position: relative;
    object-fit: cover;
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
}
.thumb {
    transition: ease 0.2s;
    position: relative;
    width: 150px;
    height: 150px;
    border: 1px solid #ccc;
}

.img-number {
    position: absolute;
    background-color: rgba(255, 255, 255, 0.548);
    top: 0;
    left: 0;
    z-index: 4;
    margin: 5px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 30px;
    box-shadow: 0px 1px 4px #0000003b;
}

button {
    padding: 10px 20px;
    padding-right: 17px;
    margin: 20px;
    border: solid 1px #ccc;
    border-radius: 25px;
    background: white;
    box-shadow: 0px 3px 7px #55647a61;
}

.thumb {
    position: relative;
    display: inline-block;
    margin: 5px;
    cursor: grab;
}

.thumb.dragging {
    opacity: 0.4;
    transform: scale(0.95);
}

.thumb.drag-over {
    outline: 3px solid #8bb4ff;
    outline-offset: 4px;
    transform: scale(1.05);
    background: rgba(76, 175, 80, 0.08);
    transition: 0.15s;
}

#progress-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: #eee;
    border-radius: 10px;
    overflow: hidden;
    display: none; /* يظهر عند التحميل فقط */
    z-index: 1000;
}

#progress-bar {
    position: absolute;
    left: 0;
    transition: ease 0.4s;
    display: block;
    height: 100%;
    width: 0%;
    background-color: #3284ff;
}

.thumb {
    touch-action: none;
}


@media (max-width: 500px) {
    button,div,a,img {
        cursor: context-menu !important;
    }
    .thumb {
        width: 122px;
        height: 140px;
    }
}
</style>
</head>
<body>

    <div id="progress-container">
        <span id="progress-bar"></span>
    </div>

    <div class="logo"><img src="Image/logo.png" alt=""></div>

<h1>Drag & Drop Images or Click to Upload</h1>
<div id="drop-area" class="Wave-cloud">
    Drag images here or click to select files
    <input type="file" id="fileElem" multiple style="display:none">
</div>

<div id="gallery"></div>

<button id="viewBtn" class="Wave-cloud">View Files</button>

<script>
const dropArea = document.getElementById('drop-area');
const fileElem = document.getElementById('fileElem');
const gallery = document.getElementById('gallery');
let images = [];
let dragIndex = null;

// عناصر شريط التحميل
const progressContainer = document.getElementById('progress-container');
const progressBar = document.getElementById('progress-bar');

// إعدادات السكرول التلقائي
const scrollEdge = 80;      // المسافة من أعلى/أسفل لتفعيل السكرول
const scrollSpeed = 15;     // سرعة السكرول
let autoScrollInterval = null;

// Open file selector on click
dropArea.addEventListener('click', () => fileElem.click());

// Handle file selection
fileElem.addEventListener('change', (e) => handleFiles(e.target.files));

// Drag & drop upload
dropArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropArea.classList.add('hover');
});
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('hover'));
dropArea.addEventListener('drop', (e) => {
    e.preventDefault();
    dropArea.classList.remove('hover');
    handleFiles(e.dataTransfer.files);
});

// قراءة الملفات مع عرض شريط التحميل
function readFileAsDataURL(file, onProgress) {
    return new Promise((resolve) => {
        const reader = new FileReader();

        reader.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                onProgress(percent);
            }
        };

        reader.onloadstart = () => {
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
        };

        reader.onload = (e) => {
            progressBar.style.width = '100%';
            setTimeout(() => {
                progressContainer.style.display = 'none';
            }, 300);
            resolve(e.target.result);
        };

        reader.readAsDataURL(file);
    });
}

// Process files
async function handleFiles(files) {
    const fileArray = Array.from(files).filter(file => file.type.startsWith('image/'));

    for (let i = 0; i < fileArray.length; i++) {
        const dataURL = await readFileAsDataURL(fileArray[i], (percent) => {
            progressBar.style.width = percent + '%';
        });
        images.push(dataURL);
    }

    displayGallery();
}

// إزالة تأثير hover من جميع الصور
function removeAllDragOver() {
    document.querySelectorAll('.thumb.drag-over')
        .forEach(el => el.classList.remove('drag-over'));
}

// التحكم في السكرول التلقائي
function handleAutoScroll(touchY) {
    const viewportHeight = window.innerHeight;

    if (touchY < scrollEdge) {
        startAutoScroll(-scrollSpeed);
    } else if (touchY > viewportHeight - scrollEdge) {
        startAutoScroll(scrollSpeed);
    } else {
        stopAutoScroll();
    }
}

function startAutoScroll(speed) {
    if (autoScrollInterval) return;

    autoScrollInterval = setInterval(() => {
        window.scrollBy(0, speed);
    }, 16); // ~60fps
}

function stopAutoScroll() {
    clearInterval(autoScrollInterval);
    autoScrollInterval = null;
}

// عرض الصور + إعادة الترتيب بالسحب (ماوس + لمس)
function displayGallery() {
    gallery.innerHTML = '';

    images.forEach((src, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'thumb';
        wrapper.draggable = true;
        wrapper.dataset.index = index;

        const img = document.createElement('img');
        img.src = src;
        img.draggable = false;

        const label = document.createElement('span');
        label.textContent = index + 1;
        label.className = 'img-number';

        wrapper.appendChild(img);
        wrapper.appendChild(label);
        gallery.appendChild(wrapper);

        // ======================
        // Drag بالماوس
        // ======================
        wrapper.addEventListener('dragstart', () => {
            dragIndex = index;
            wrapper.classList.add('dragging');
        });

        wrapper.addEventListener('dragend', () => {
            wrapper.classList.remove('dragging');
            removeAllDragOver();
        });

        wrapper.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (dragIndex === index) return;
            removeAllDragOver();
            wrapper.classList.add('drag-over');
        });

        wrapper.addEventListener('dragleave', () => wrapper.classList.remove('drag-over'));

        wrapper.addEventListener('drop', () => {
            const dropIndex = index;
            if (dragIndex === null || dragIndex === dropIndex) return;

            const movedItem = images.splice(dragIndex, 1)[0];
            images.splice(dropIndex, 0, movedItem);

            dragIndex = null;
            displayGallery();
        });

        // ======================
        // Drag باللمس + Auto Scroll
        // ======================
        wrapper.addEventListener('touchstart', () => {
            dragIndex = index;
            wrapper.classList.add('dragging');
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();

            const touch = e.touches[0];

            // تفعيل السكرول التلقائي
            handleAutoScroll(touch.clientY);

            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            if (!element) return;

            const target = element.closest('.thumb');
            if (!target) return;

            const overIndex = Number(target.dataset.index);
            if (overIndex === dragIndex) return;

            removeAllDragOver();
            target.classList.add('drag-over');

        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            stopAutoScroll();

            const touch = e.changedTouches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);

            wrapper.classList.remove('dragging');
            removeAllDragOver();

            if (!element) {
                dragIndex = null;
                return;
            }

            const target = element.closest('.thumb');
            if (!target) {
                dragIndex = null;
                return;
            }

            const dropIndex = Number(target.dataset.index);

            if (dragIndex !== null && dragIndex !== dropIndex) {
                const movedItem = images.splice(dragIndex, 1)[0];
                images.splice(dropIndex, 0, movedItem);
                displayGallery();
            }

            dragIndex = null;
        });
    });
}

// إرسال الصور للصفحة الأخرى بالترتيب
document.getElementById('viewBtn').addEventListener('click', () => {
    if (images.length === 0) {
        alert('Please upload images first');
        return;
    }

    localStorage.setItem('pdfImages', JSON.stringify(images));
    window.location.href = 'viewer.html';
});
</script>

</body>
</html>
