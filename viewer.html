<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="Image/logo.png">
<title>View file - PDF viewer with share & download</title>
<!-- Ionicons -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<!-- Wave & Title effects (保持不变) -->
<script src="https://cdn.jsdelivr.net/gh/IconCanyon/Icon-canyon@main/Wave-cloud-3.0.0.js"></script>
<script src="https://cdn.jsdelivr.net/gh/IconCanyon/Icon-canyon@main/Title-Style-1.0.0.js"></script>
<!-- jsPDF لإنشاء ملف PDF -->
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    display: flex;
    height: 100vh;
    user-select: none;
}

img {
    user-select: none !important;
    -webkit-user-drag: none !important;
    display: flex !important;
}

.flexe {
    display: flex;
    align-items: center;
}

.flex {
    margin-top: 56px;
    height: -webkit-fill-available;
    width: 100%;
    display: flex;
}

button {
    cursor: pointer;
    font-family: Arial;
    font-size: 14px;
    display: flex;
    align-items: center;
    background-color: #0000;
}

/* القائمة الجانبية */
#sidebar {
    width: 300px;
    padding: 24px 0;
    background: #f6f8fa;
    overflow-y: auto;
    border-right: 1px solid #d1d9e0;
    touch-action: none; /* للسحب على الهواتف */
    /* حركة السلايدر خارج JS */
    transition: left 0.1s ease; /* هذا الجزء يجعل التحريك سلس */
}

.sidebar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    width: max-content;
    margin: auto;
}
.sidebar-item:not(:last-child) {
    margin-bottom: 10px; 
}

.sidebar-item-inner {
    position: relative;
    overflow: hidden;
    height: 152px;
    width: 108px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* padding: 4px; */
    background: #fff;
}
.sidebar-item-inner .ripple {
    background-color: #5197ff48;
}

.sidebar-item-inner::after {
    position: absolute;
    z-index: 5;
    content: '';
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    opacity: .5;
    background-color: white;
}
.sidebar-item-inner:hover:after {
    opacity: .2;
}

.sidebar-item-inner canvas {
    max-width: 100px;
    max-height: 100px;
    object-fit: cover;
}

.sidebar-item.active .sidebar-item-inner {
    box-shadow: 0 0 0 6px rgb(138,180,248);
}
.sidebar-item.active ::after {
    opacity: 0 !important;
}

.page-number {
    margin-top: 14px;
    font-size: 14px;
}

/* ديف العرض */
#page-view {
    flex: 1;
    padding: 5px 0;
    overflow-y: auto;
    background: #f0f0f0;
    scroll-behavior: smooth;
}

.page-container {
    width: 794px;   /* عرض A4 بالبيكسل */
    height: 1123px; /* ارتفاع A4 بالبيكسل */
    background: white;
    display: flex;
    justify-content: center;
    margin: 0 auto;
    align-items: center;
    box-shadow: 0 0 10px rgb(85 93 107 / 30%);
}

.page-container:not(:last-child) { margin-bottom: 20px !important; }

.page-container canvas {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

.back {
    position: absolute;
    z-index: 50;
    bottom: 0;
    right: 0;
    padding: 10px 20px;
    padding-right: 17px;
    margin: 20px;
    border: solid 1px #ccc;
    border-radius: 25px;
    background: white;
    box-shadow: 0px 3px 7px #55647a61;
}
.back ion-icon { font-size: 20px; margin-left: 8px; }

.menu {
    position: fixed;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background-color: #f6f8fa;
    box-shadow: 0px 1px 0px #d1d9e0;
}
.menu .logo {
    display: flex;
    align-items: center;
    width: max-content;
    font-size: 18px;
}
.menu .logo img {
    height: 30px;
    margin-right: 8px;
}
.menu .logo span {
    color: #5197ff;
    margin: 0 2px;
}
.logo button {
    display: none;
    margin-right: 8px;
    margin-left: 0 !important;
}

.menu .flexe button {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 25px;
    margin-left: 8px;
    font-size: 24px;
    transition: background-color 0.2s;
}
.menu .flexe button:hover {
    background-color: #e0e4e9;
}
.menu .flexe button:disabled {
    opacity: 0.5;
    pointer-events: none;
}



@media (max-width: 500px) {
    button,div,a {
        cursor: context-menu !important;
    }
    body #sidebar {
        position: fixed;
        z-index: 100;
        margin-top: 56px;
        top: 0;
        opacity: 0;
        left: -251px;
        bottom: 0;
        box-shadow: 2px 0px 30px #b6c3cfb8;
        width: 250px;
    }
    .menu {
        z-index: 110 !important;
    }
    .logo button {
        display: flex;
    }
    body .page-container {
        width: 100%;
        height: 100%;
    }
    /* عند فتح Sidebar */
    #sidebar.open {
        left: 0;
        opacity: 1;
    }
}
</style>
</head>
<body>

<div class="menu">
    <div class="logo flexe Wave-all-center">
        <button id="toggleBtn"><ion-icon name="menu-outline"></ion-icon></button>
        <img src="Image/logo.png" alt=""> Photo Art ( <span title="Display version">View</span> )
    </div>

    <div class="flexe Wave-all-center">
        <!-- تم إضافة id لتحديد الأزرار -->
        <button id="share-button" title="Share the file"><ion-icon name="arrow-redo-outline"></ion-icon></button>
        <button id="download-button" title="Download file"><ion-icon name="arrow-down-circle-outline"></ion-icon></button>
    </div>
</div>

<div class="flex">
    <div id="sidebar"></div>
    <div id="page-view"></div>
</div>

<a href="index.html"><button class="back Wave-cloud">Going back <ion-icon name="arrow-forward-outline"></ion-icon></button></a>

<script>
const sidebar = document.getElementById('sidebar');
const pageView = document.getElementById('page-view');

let images = JSON.parse(localStorage.getItem('pdfImages') || '[]');
let pageContainers = [];

// دالة تأخير
function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// =======================================
// عرض القائمة الجانبية
// =======================================
async function displaySidebar() {
    sidebar.innerHTML = '';

    for (let index = 0; index < images.length; index++) {
        const src = images[index];

        const item = document.createElement('div');
        item.classList.add('sidebar-item');
        if (index === 0) item.classList.add('active');

        const inner = document.createElement('div');
        inner.classList.add('sidebar-item-inner', 'Wave-cloud');

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 300;
        canvas.height = 300;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        const image = new Image();
        image.src = src;
        image.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let scale = Math.min(canvas.width / image.width, canvas.height / image.height);
            let w = image.width * scale;
            let h = image.height * scale;
            ctx.drawImage(image, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
        };

        inner.appendChild(canvas);

        const pageNum = document.createElement('div');
        pageNum.classList.add('page-number');
        pageNum.textContent = `${index + 1}`;

        item.appendChild(inner);
        item.appendChild(pageNum);

        item.addEventListener('click', () => scrollToPage(index));

        sidebar.appendChild(item);
        await delay(1);
    }
}

// =======================================
// عرض الصفحات
// =======================================
async function displayPages() {
    pageView.innerHTML = '';
    pageContainers = [];

    for (let index = 0; index < images.length; index++) {
        const src = images[index];

        const container = document.createElement('div');
        container.classList.add('page-container');

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const scaleFactor = 3;
        canvas.width = 794 * scaleFactor;
        canvas.height = 1123 * scaleFactor;
        canvas.style.width = '794px';
        canvas.style.height = '1123px';

        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";

        const image = new Image();
        image.src = src;
        image.onload = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let scale = Math.min(canvas.width / image.width, canvas.height / image.height);
            let w = image.width * scale;
            let h = image.height * scale;
            ctx.drawImage(image, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
        };

        container.appendChild(canvas);
        pageView.appendChild(container);
        pageContainers.push(container);

        await delay(1);
    }
}

// =======================================
// التمرير إلى صفحة
// =======================================
function scrollToPage(index) {
    pageContainers[index].scrollIntoView({
        behavior: 'smooth',
        block: 'start'
    });
    updateSidebarActive(index);
}

// =======================================
// تحديث العنصر النشط + تمرير القائمة الجانبية
// =======================================
function updateSidebarActive(index) {
    Array.from(sidebar.children).forEach((el, i) => {
        if (i === index) {
            el.classList.add('active');

            // تمرير القائمة الجانبية تلقائياً للعنصر
            el.scrollIntoView({
                behavior: 'smooth',
                block: 'center'
            });

        } else {
            el.classList.remove('active');
        }
    });
}

// =======================================
// تتبع الصفحة الحالية بدقة
// =======================================
pageView.addEventListener('scroll', () => {
    let viewMiddle = pageView.scrollTop + pageView.clientHeight / 2;

    let closestIndex = 0;
    let minDist = Infinity;

    pageContainers.forEach((container, i) => {
        const containerMiddle = container.offsetTop + container.offsetHeight / 2;
        const dist = Math.abs(containerMiddle - viewMiddle);

        if (dist < minDist) {
            minDist = dist;
            closestIndex = i;
        }
    });

    updateSidebarActive(closestIndex);
});

// =======================================
// نوع الصورة
// =======================================
function getImageTypeFromBase64(str) {
    if (str.startsWith('data:image/jpeg')) return 'JPEG';
    if (str.startsWith('data:image/png')) return 'PNG';
    return 'JPEG';
}

// =======================================
// إنشاء PDF مع دعم الشفافية
// =======================================
async function generatePDFBlob() {
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
        orientation: 'p',
        unit: 'in',
        format: [6, 9]
    });

    const pageWidth = 6;
    const pageHeight = 9;

    const marginTop = 0.5;
    const marginBottom = 0.75;
    const marginOuter = 0.5;
    const marginInner = 0.75;

    for (let i = 0; i < images.length; i++) {

    let src = images[i]; // <-- هنا نغير const إلى let

    let imgType = getImageTypeFromBase64(src);
    if (imgType !== 'PNG') {
        // تحويل JPEG إلى PNG للحفاظ على الشفافية
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        const tempImg = new Image();
        tempImg.src = src;
        await new Promise((res, rej) => {
            tempImg.onload = res;
            tempImg.onerror = rej;
        });

        tempCanvas.width = tempImg.width;
        tempCanvas.height = tempImg.height;
        tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(tempImg, 0, 0);

        src = tempCanvas.toDataURL('image/png'); // الآن PNG
        imgType = 'PNG';
    }

        const isEven = (i + 1) % 2 === 0;
        const marginLeft = isEven ? marginOuter : marginInner;
        const marginRight = isEven ? marginInner : marginOuter;

        const contentWidth = pageWidth - marginLeft - marginRight;
        const contentHeight = pageHeight - marginTop - marginBottom;

        const img = new Image();
        img.src = src;

        await new Promise((res, rej) => {
            img.onload = res;
            img.onerror = rej;
        });

        const ratio = Math.min(
            contentWidth / (img.width / 300),
            contentHeight / (img.height / 300)
        );

        const w = (img.width / 300) * ratio;
        const h = (img.height / 300) * ratio;

        const x = marginLeft + (contentWidth - w) / 2;
        const y = marginTop + (contentHeight - h) / 2;

        pdf.addImage(src, imgType, x, y, w, h, undefined, 'FAST');

        pdf.setFont("helvetica", "normal");
        pdf.setFontSize(10);
        pdf.text(
            String(i + 1),
            pageWidth / 2,
            pageHeight - 0.4,
            { align: "center" }
        );

        if (i < images.length - 1) {
            pdf.addPage();
        }
    }

    return pdf.output('blob');
}

// =======================================
// تنزيل مع تسمية مسبقة
// =======================================
async function downloadPDF() {
    const btn = document.getElementById('download-button');
    btn.disabled = true;

    try {

        const fileName = prompt("أدخل اسم الملف قبل التنزيل:", "Amazon-KDP-Book");

        if (!fileName) {
            btn.disabled = false;
            return;
        }

        const blob = await generatePDFBlob();
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        a.download = fileName.endsWith('.pdf') ? fileName : fileName + '.pdf';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        URL.revokeObjectURL(url);

    } catch (e) {
        alert('فشل إنشاء PDF');
        console.error(e);
    } finally {
        btn.disabled = false;
    }
}

// =======================================
// مشاركة
// =======================================
async function sharePDF() {
    if (!navigator.share) {
        alert('المتصفح لا يدعم المشاركة');
        return;
    }

    const fileName = prompt("أدخل اسم الملف للمشاركة:", "Amazon-KDP-Book") || "Amazon-KDP-Book";

    const blob = await generatePDFBlob();
    const file = new File([blob], fileName + '.pdf', { type: 'application/pdf' });

    await navigator.share({
        title: fileName,
        files: [file]
    });
}

// =======================================
// تشغيل
// =======================================
(async () => {
    await displaySidebar();
    await displayPages();
    scrollToPage(0);

    document.getElementById('share-button').addEventListener('click', sharePDF);
    document.getElementById('download-button').addEventListener('click', downloadPDF);
})();
</script>


<script>
const toggleBtn = document.getElementById('toggleBtn');

let isOpen = false;
let startX = 0;
let currentX = 0;
let dragging = false;

// فتح وغلق بالسير عبر الزر
toggleBtn.addEventListener('click', () => {
    if(isOpen){
        closeSidebar();
    } else {
        openSidebar();
    }
});

function openSidebar() {
    sidebar.classList.add('open'); // استخدم الكلاس للتحريك
    isOpen = true;
}

function closeSidebar() {
    sidebar.classList.remove('open'); // إزالة الكلاس لإخفاء الديف
    isOpen = false;
}

// سحب الديف
sidebar.addEventListener('mousedown', startDrag);
sidebar.addEventListener('touchstart', startDrag);

function startDrag(e) {
    dragging = true;
    startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
    currentX = startX;

    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', endDrag);
    document.addEventListener('touchmove', onDrag);
    document.addEventListener('touchend', endDrag);
}

function onDrag(e) {
    if(!dragging) return;
    let clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
    let deltaX = clientX - startX;

    // نسمح فقط بالسحب لليسار
    if(deltaX < 0){
        sidebar.style.left = Math.max(deltaX, -sidebar.offsetWidth) + 'px';
        currentX = clientX;
    }
}

function endDrag() {
    dragging = false;
    let moved = startX - currentX;
    if(moved > sidebar.offsetWidth / 2){
        closeSidebar();
    } else {
        openSidebar();
    }

    // إعادة ضبط الـstyle بعد السحب للتوافق مع CSS
    sidebar.style.left = '';

    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', endDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', endDrag);
}

// عند تحميل الصفحة، إخفاء الديف
closeSidebar();
</script>


</body>
</html>
